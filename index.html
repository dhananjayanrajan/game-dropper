<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Merge Falls · Cute Physics Shape Dropper</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: 'Quicksand', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e0e8f0;
    }

    #mobileWrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: #e0e8f0;
      overflow: hidden;
    }

    @media (min-width: 640px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #mobileWrapper {
        width: 440px;
        height: 780px;
        border-radius: 40px;
        border: 12px solid #d2dee9;
        box-shadow: inset 6px 6px 12px #beccda, inset -6px -6px 12px #ffffff;
      }
    }

    #canvasContainer {
      position: absolute;
      top: 106px;
      bottom: 85px;
      left: 0;
      right: 0;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .iconBtn {
      transition: all 0.1s ease;
      cursor: pointer;
    }

    .iconBtn:active {
      transform: scale(0.95);
    }

    #gameLostOverlay {
      position: absolute;
      inset: 0;
      background: rgba(224, 232, 240, 0.95);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="mobileWrapper">
    <div class="absolute top-0 left-0 right-0 z-20 p-4 flex flex-col gap-2">
      <div class="flex justify-between items-center">
        <div
          class="bg-[#e0e8f0] border border-white/60 shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff] rounded-full px-4 py-1.5 flex items-center gap-1.5">
          <span class="text-base">⏱️</span>
          <span id="timerDisplay" class="font-extrabold text-base text-stone-700">0.0</span>
        </div>
        <div class="flex gap-2">
          <button id="muteBtn"
            class="iconBtn bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] rounded-full w-10 h-10 flex items-center justify-center text-sm">🔊</button>
          <button id="pauseBtn"
            class="iconBtn bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] rounded-full w-10 h-10 flex items-center justify-center text-sm">⏸️</button>
          <button id="resetBtn"
            class="iconBtn bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] rounded-full w-10 h-10 flex items-center justify-center text-sm">🔄</button>
        </div>
      </div>
      <div class="flex justify-center">
        <div
          class="bg-gradient-to-br from-[#ffb347] to-[#ff8c1a] shadow-[4px_4px_10px_#beccda] rounded-full px-6 py-1.5 flex items-center gap-1.5 text-white font-black text-2xl">
          <span class="text-lg">⭐</span>
          <span id="scoreDisplay">0</span>
        </div>
      </div>
    </div>

    <div id="canvasContainer">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="absolute bottom-0 left-0 right-0 z-20 p-4">
      <div
        class="bg-[#e0e8f0] border border-white/60 shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff] rounded-2xl px-5 py-3 flex justify-between items-center">
        <span class="text-xs font-black text-stone-500 uppercase tracking-wider">Next Fruit</span>
        <div class="flex items-center gap-3">
          <span id="nextShapeName" class="text-sm font-black text-stone-700"></span>
          <div id="nextShapePreview"
            class="w-10 h-10 rounded-xl shadow-[inset_3px_3px_6px_rgba(0,0,0,0.15),inset_-3px_-3px_6px_rgba(255,255,255,0.6)] border border-white/40">
          </div>
        </div>
      </div>
    </div>

    <div id="gameLostOverlay">
      <div
        class="bg-[#e0e8f0] shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff] rounded-3xl p-8 text-center max-w-xs mx-4 border border-white">
        <div class="text-6xl mb-2 animate-bounce">🍎💥</div>
        <h2 class="text-2xl font-black text-stone-800">BOX OVERFLOW!</h2>
        <p class="text-sm mt-2 text-stone-600">The fruits reached the limit line!</p>
        <button id="restartGameBtn"
          class="mt-6 bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] text-stone-800 text-base px-8 py-3 rounded-full font-extrabold">Play
          Again 🎮</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
