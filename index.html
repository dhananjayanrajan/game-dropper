<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Merge Falls · Cute Physics Shape Dropper</title>
</head>

<body
  class="flex flex-col items-center justify-center min-h-screen p-0 sm:p-4 gap-5 bg-[#e0e8f0] select-none overflow-hidden m-0">

  <div id="mobileWrapper"
    class="relative w-full h-[calc(100vh-100px)] sm:w-[440px] sm:h-[780px] sm:rounded-[40px] border-[12px] border-[rgba(210,222,233,1)] bg-[#e0e8f0] shadow-[inset_6px_6px_12px_#beccda,inset_-6px_-6px_12px_#ffffff] overflow-hidden flex flex-col justify-between">

    <div class="absolute top-0 left-0 w-full z-20 pointer-events-none p-4 flex justify-between items-center gap-2">
      <div
        class="pointer-events-auto flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-[#e0e8f0] border border-white/60 shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff]">
        <span class="text-base">⏱️</span>
        <span id="timerDisplay" class="font-extrabold text-base text-stone-700 tracking-wide font-mono">0.0</span>
      </div>

      <div
        class="pointer-events-auto flex items-center gap-1.5 px-6 py-1.5 rounded-full bg-gradient-to-br from-[#ffb347] to-[#ff8c1a] text-white font-black text-2xl tracking-wide shadow-[4px_4px_10px_#beccda] drop-shadow-[0_1px_2px_rgba(161,80,12,0.4)]">
        <span class="text-lg">⭐</span>
        <span id="scoreDisplay">0</span>
      </div>

      <div class="flex gap-2 pointer-events-auto">
        <button id="muteBtn"
          class="bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] active:shadow-[inset_2px_2px_5px_#beccda,inset_-2px_-2px_5px_#ffffff] text-stone-700 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm transition transition-all duration-150 active:scale-94 cursor-pointer">🔊</button>
        <button id="pauseBtn"
          class="bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] active:shadow-[inset_2px_2px_5px_#beccda,inset_-2px_-2px_5px_#ffffff] text-stone-700 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm transition transition-all duration-150 active:scale-94 cursor-pointer">⏸️</button>
        <button id="resetBtn"
          class="bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] active:shadow-[inset_2px_2px_5px_#beccda,inset_-2px_-2px_5px_#ffffff] text-stone-700 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm transition transition-all duration-150 active:scale-94 cursor-pointer">🔄</button>
      </div>
    </div>

    <div id="canvasContainer" class="absolute inset-0 z-0">
      <canvas id="gameCanvas" class="w-full h-full block"></canvas>
    </div>

    <div id="gameLostOverlay"
      class="absolute inset-0 bg-[rgba(224,232,240,0.9)] backdrop-blur-md flex items-center justify-center z-30 hidden">
      <div
        class="bg-[#e0e8f0] shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff] rounded-3xl p-8 text-center max-w-xs w-full mx-4 border border-white">
        <div class="text-6xl mb-2 animate-bounce">🍎💥</div>
        <h2 class="text-2xl font-black text-stone-800 tracking-tight">BOX OVERFLOW!</h2>
        <p class="text-sm mt-2 text-stone-600 font-medium">The fruits reached the limit line!</p>
        <button id="restartGameBtn"
          class="mt-6 bg-[#e0e8f0] border border-white/70 shadow-[4px_4px_8px_#beccda,-4px_-4px_8px_#ffffff] active:shadow-[inset_2px_2px_5px_#beccda,inset_-2px_-2px_5px_#ffffff] text-stone-800 text-base px-8 py-3 rounded-full font-extrabold transition transition-all duration-150 active:scale-94 cursor-pointer">Play
          Again 🎮</button>
      </div>
    </div>
  </div>

  <div class="w-full sm:w-[440px] px-4 pointer-events-auto z-20">
    <div
      class="bg-[#e0e8f0] border border-white/60 shadow-[5px_5px_10px_#beccda,-5px_-5px_10px_#ffffff] px-5 py-3 rounded-2xl flex justify-between items-center w-full">
      <span class="text-xs font-black text-stone-500 uppercase tracking-wider">Next Fruit</span>
      <div class="flex items-center gap-3">
        <span id="nextShapeName" class="text-sm font-black text-stone-700 tracking-tight"></span>
        <div id="nextShapePreview"
          class="w-10 h-10 flex items-center justify-center shadow-[inset_3px_3px_6px_rgba(0,0,0,0.15),inset_-3px_-3px_6px_rgba(255,255,255,0.6)] border border-white/40">
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
