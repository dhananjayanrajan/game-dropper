<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Merge Falls · Cute Physics Shape Dropper</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #powerUpQueue::-webkit-scrollbar {
      height: 4px;
    }

    #powerUpQueue::-webkit-scrollbar-track {
      background: #e2e8f0;
      border-radius: 10px;
    }

    #powerUpQueue::-webkit-scrollbar-thumb {
      background: #1cb0f6;
      border-radius: 10px;
    }

    .queue-item {
      aspect-ratio: 1;
      min-width: 75px;
      width: 75px;
    }
  </style>
</head>

<body class="m-0 p-0 w-screen h-screen overflow-hidden bg-[#f1f5f9] flex items-center justify-center select-none">
  <div id="gameContainer" class="relative w-full h-full bg-[#ffffff] overflow-hidden flex flex-col">

    <div class="p-4 flex flex-col gap-3 shrink-0 bg-[#ffffff] border-b-2 border-[#e2e8f0]">
      <div class="flex justify-between items-center">
        <div
          class="bg-[#f8fafc] border-2 border-[#e2e8f0] rounded-2xl px-4 py-2 flex items-center gap-2 shadow-[0_2px_0_0_#e2e8f0]">
          <span class="text-lg">⏱️</span>
          <span id="timerDisplay" class="font-black text-base text-[#475569]">0.0</span>
        </div>
        <div class="flex gap-2">
          <button id="muteBtn"
            class="active:translate-y-[2px] active:shadow-none transition-all bg-[#ffffff] hover:bg-[#f8fafc] border-2 border-[#e2e8f0] text-[#475569] rounded-2xl w-12 h-12 flex items-center justify-center text-lg font-bold cursor-pointer shadow-[0_4px_0_0_#e2e8f0]">🔊</button>
          <button id="pauseBtn"
            class="active:translate-y-[2px] active:shadow-none transition-all bg-[#ffffff] hover:bg-[#f8fafc] border-2 border-[#e2e8f0] text-[#475569] rounded-2xl w-12 h-12 flex items-center justify-center text-lg font-bold cursor-pointer shadow-[0_4px_0_0_#e2e8f0]">⏸️</button>
          <button id="resetBtn"
            class="active:translate-y-[2px] active:shadow-none transition-all bg-[#ff4b4b] hover:bg-[#ff5f5f] border-2 border-[#ea2b2b] text-white rounded-2xl w-12 h-12 flex items-center justify-center text-lg font-bold cursor-pointer shadow-[0_4px_0_0_#ea2b2b]">🔄</button>
        </div>
      </div>
      <div class="flex justify-center">
        <div
          class="bg-[#ffc800] border-2 border-[#e6b400] rounded-2xl px-10 py-2.5 flex items-center gap-2 text-white font-black text-3xl tracking-wide shadow-[0_4px_0_0_#e6b400]">
          <span class="drop-shadow-[0_2px_0_rgba(0,0,0,0.15)]">⭐</span>
          <span id="scoreDisplay" class="drop-shadow-[0_2px_0_rgba(0,0,0,0.15)]">0</span>
        </div>
      </div>
    </div>

    <div id="canvasContainer" class="flex-1 relative w-full overflow-hidden bg-[#f8fafc]">
      <canvas id="gameCanvas" class="w-full h-full block"></canvas>
    </div>

    <div class="shrink-0 bg-[#ffffff] border-t-2 border-[#e2e8f0] p-4">
      <div class="bg-[#f8fafc] border-2 border-[#e2e8f0] rounded-2xl p-3">
        <div class="flex justify-between items-center mb-2 px-1">
          <span class="text-xs font-black text-[#1cb0f6] uppercase tracking-wider">Drop Queue</span>
          <span id="activePowerBadge"
            class="text-xs font-bold text-[#58cc02] hidden bg-[#58cc02]/20 px-2 py-1 rounded-full">POWER UP
            ACTIVE</span>
        </div>
        <div id="powerUpQueue" class="flex gap-3 overflow-x-auto pb-2"></div>
      </div>
    </div>

    <div id="gameLostOverlay" class="hidden fixed inset-0 bg-[#ffffff]/95 flex items-center justify-center z-30">
      <div
        class="bg-[#ffffff] border-4 border-[#ff4b4b] rounded-3xl p-8 text-center max-w-xs mx-4 shadow-[0_8px_0_0_#ff4b4b]">
        <div class="text-7xl mb-4">👑💥</div>
        <h2 class="text-3xl font-black text-[#3c3c3c] tracking-tight">BOX OVERFLOW!</h2>
        <p class="text-base mt-2 text-[#777777] font-bold">The shapes reached the limit line!</p>
        <button id="restartGameBtn"
          class="active:translate-y-[2px] active:shadow-none transition-all mt-8 w-full bg-[#58cc02] hover:bg-[#61e002] border-2 border-[#46a302] text-white text-lg py-3.5 rounded-2xl font-black tracking-wider uppercase cursor-pointer shadow-[0_5px_0_0_#46a302]">Play
          Again 🎮</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
